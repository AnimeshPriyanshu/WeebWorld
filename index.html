<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeebWorld</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
<nav class="navbar">
    <img src="images/logo.webp" alt="WeebWorld" class="logo">
    <div class="nav-scroll">
        <button id="dark-btn">🌙</button>
        <button id="rand-btn">Surprise Me</button>
        <button id="login-btn">Login</button>
        <button id="signin-btn">Sign In</button>
    </div>
</nav>

<div class="search-box">
    <input type="text" id="search" placeholder="Search anime...">
    <button id="btn">Search</button>
</div>
<div class="options">
    <select id="sort">
        <option value="default">Sort By</option>
        <option value="az">A to Z</option>
        <option value="za">Z to A</option>
    </select>
    <select id="rating-filter">
        <option value="0">Min Rating</option>
        <option value="5">5+</option>
        <option value="6">6+</option>
        <option value="7">7+</option>
        <option value="8">8+</option>
        <option value="9">9+</option>
    </select>
    <select id="genre-filter">
        <option value="all">All Genres</option>
        <option value="Action">Action</option>
        <option value="Comedy">Comedy</option>
        <option value="Fantasy">Fantasy</option>
        <option value="Drama">Drama</option>
    </select>
</div>

<div id="home-content">
    <div class="sect">
        <h2>Most Popular</h2>
        <div id="top-list" class="grid"></div>
    </div>
    
    <div class="sect">
        <h2>Trending</h2>
        <div id="new-list" class="grid"></div>
    </div>

    <div class="sect">
        <h2>Upcoming</h2>
        <div id="up-list" class="grid"></div>
    </div>
</div>

<div id="results-info"></div>
<div id="results"></div>
<div id="pagination"></div>

<footer>
    <p>&copy; 2026 WeebWorld. All rights reserved by Animesh.</p>
</footer>

<div id="pop-box" class="modal hidden">
    <div class="modal-content">
        <span id="close-pop">&times;</span>
        <img id="pop-img" src="" alt="poster">
        <div class="pop-details">
            <h2 id="pop-title"></h2>
            <p id="pop-score"></p>
            <p id="pop-type"></p>
            <p id="pop-episodes"></p>
            <p id="pop-status"></p>
            <p id="pop-aired"></p>
            <p id="pop-premiered"></p>
            <p id="pop-producers"></p>
            <p id="pop-studios"></p>
            <p id="pop-genres"></p>
            <p id="pop-themes"></p>
            <p id="pop-duration"></p>
            <p id="pop-rating"></p>
            <p id="pop-text"></p>
        </div>
    </div>
</div>

<script src="js/index.js"></script>
</body>
</html>
